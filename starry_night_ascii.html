const COLS = 81;
const ROWS = 50;
const CELL_W = 11;
const CELL_H = 14;
const GRID_STEP = 24;
const W = 900;
const H = 712;

// Draw grid layer (static)
const gridCanvas = document.getElementById('grid');
const gctx = gridCanvas.getContext('2d');
gctx.fillStyle = 'rgba(255,255,255,0.05)';
for (let row = 0; row < ROWS; row++) {
  for (let col = 0; col < COLS; col++) {
    const cell = CELLS[row * COLS + col];
    if (!cell || !cell.subject) continue;
    if (col * CELL_W % GRID_STEP === 0 && row * CELL_H % GRID_STEP === 0) {
      gctx.fillRect(col * CELL_W, row * CELL_H, GRID_STEP, GRID_STEP);
    }
  }
}

// ASCII animation
const canvas = document.getElementById('ascii');
const ctx = canvas.getContext('2d');
ctx.font = CELL_W + 'px monospace';
ctx.textBaseline = 'top';

let frame = 0;
let mouseCol = -100, mouseRow = -100;
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const sx = W / rect.width;
  const sy = H / rect.height;
  mouseCol = Math.floor((e.clientX - rect.left) * sx / CELL_W);
  mouseRow = Math.floor((e.clientY - rect.top) * sy / CELL_H);
});
canvas.addEventListener('mouseleave', () => { mouseCol = -100; mouseRow = -100; });

// Flicker state
const flicker = new Array(CELLS.length).fill(0);
const ASCII_CHARS = "@#S08Xox+=;:-,.";

function draw() {
  ctx.clearRect(0, 0, W, H);
  frame++;
  const t = frame / 60;
  const scanDiag = (frame * 2) % (COLS + ROWS);

  for (let i = 0; i < CELLS.length; i++) {
    const cell = CELLS[i];
    if (!cell) continue;
    const col = i % COLS;
    const row = Math.floor(i / COLS);
    const x = col * CELL_W;
    const y = row * CELL_H;

    if (!cell.subject) {
      ctx.globalAlpha = 0.3;
      ctx.fillStyle = `rgb(${cell.r},${cell.g},${cell.b})`;
      ctx.fillText(cell.ch, x, y);
      ctx.globalAlpha = 1;
      continue;
    }

    let ch = cell.ch;
    let r = cell.r, g = cell.g, b = cell.b;
    let alpha = 1.0;

    // Sinusoidal pulse on bright cells
    const pulse = cell.bright > 0.6
      ? 0.15 * Math.sin(t * 2.5 + col * 0.3 + row * 0.2)
      : 0;

    // Diagonal light sweep
    const diagVal = col + row;
    const sweep = Math.abs(diagVal - scanDiag) < 3
      ? 0.3 * (1 - Math.abs(diagVal - scanDiag) / 3)
      : 0;

    // Random flicker
    if (flicker[i] > 0) {
      flicker[i]--;
      alpha = 0.3 + Math.random() * 0.7;
    } else if (Math.random() < 0.0025) {
      flicker[i] = 2 + Math.floor(Math.random() * 6);
    }

    // Hover ripple
    const dc = col - mouseCol, dr = row - mouseRow;
    const dist = Math.sqrt(dc*dc + dr*dr);
    if (dist < 8) {
      const ripple = (8 - dist) / 8;
      r = Math.min(255, Math.floor(r * (1 - ripple * 0.5) + 0 * ripple * 0.5));
      g = Math.min(255, Math.floor(g * (1 - ripple * 0.5) + 255 * ripple * 0.5));
      b = Math.min(255, Math.floor(b * (1 - ripple * 0.5) + 255 * ripple * 0.5));
      if (dist < 2) {
        ch = ASCII_CHARS[Math.floor(Math.random() * ASCII_CHARS.length)];
      }
    }

    // Glow on bright cells
    if (cell.bright > 0.5) {
      const glow = (cell.bright + pulse) * 12;
      ctx.shadowBlur = glow;
      ctx.shadowColor = `rgb(${r},${g},${b})`;
    } else {
      ctx.shadowBlur = 0;
    }

    const bright = Math.min(1, cell.bright + pulse + sweep);
    ctx.globalAlpha = Math.min(1, alpha * (0.7 + bright * 0.3));
    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.fillText(ch, x, y);
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  requestAnimationFrame(draw);
}
